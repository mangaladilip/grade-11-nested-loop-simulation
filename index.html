<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F9f9fa; color: #232323; font-family: 'Outfit', sans-serif; padding: 40px; font-size: 18px; }
        .main-wrapper { display: flex; gap: 20px; max-width: 1000px; margin: auto; }
        .left-panel { flex: 2; }
        .right-panel { flex: 1; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #724b9e; margin-top: 0; }
        
        .code-container { background: #232323; color: #fff; padding: 20px; border-radius: 6px; font-family: monospace; font-size: 18px; line-height: 2.2; }
        .code-line { padding: 4px 8px; border-radius: 4px; }
        .active-line { background-color: rgba(232, 210, 39, 0.4); border: 1px solid #e8d227; }
        
        .state-grid { display: flex; gap: 20px; margin: 20px 0; }
        .state-box { padding: 15px; background: #e8d227; border-radius: 6px; font-weight: 600; flex: 1; text-align: center; }
        
        input { width: 60px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Outfit'; }
        button { background-color: #724b9e; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 6px; font-weight: 600; font-family: 'Outfit'; }
        #output-box { background: #232323; color: #fff; padding: 20px; border-radius: 6px; height: 350px; overflow-y: auto; font-family: monospace; }
        .instruction { font-size: 14px; color: #666; font-style: italic; margin-top: 5px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="left-panel container">
        <h2>Nested Loop Simulator</h2>
        <div style="margin-bottom: 20px;">
            i in range(<input id="outerRange" type="number" value="3">)<br>
            j in range(<input id="innerRange" type="text" value="i + 1" style="width:100px">)<br>
            <div class="instruction">Expression hint: Use 'i' and numbers (e.g., i+1, 5-i, i*2)</div>
            Symbol: <input id="symbol" type="text" value="*" style="width:30px">
            <button onclick="initSimulator()">Initialize</button>
            <button onclick="nextStep()">Next Step</button>
        </div>

        <div class="state-grid">
            <div id="i-display" class="state-box">i: --</div>
            <div id="j-display" class="state-box">j: --</div>
        </div>

        <strong>Python Code:</strong>
        <div class="code-container">
            <div id="line-0" class="code-line">for i in range(outerRange):</div>
            <div id="line-1" class="code-line">&nbsp;&nbsp;&nbsp;&nbsp;for j in range(inner_logic):</div>
            <div id="line-2" class="code-line">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(symbol, end="")</div>
            <div id="line-3" class="code-line">&nbsp;&nbsp;&nbsp;&nbsp;print()</div>
        </div>
    </div>

    <div class="right-panel container">
        <strong>Terminal Output:</strong>
        <div id="output-box"></div>
    </div>
</div>

<script>
    let i = 0, j = 0, step = 0, outerLimit, innerLogic, symbol;
    const outputBox = document.getElementById('output-box');

    function initSimulator() {
        outerLimit = parseInt(document.getElementById('outerRange').value);
        innerLogic = document.getElementById('innerRange').value;
        symbol = document.getElementById('symbol').value;
        i = 0; j = 0; step = 0;
        outputBox.innerHTML = "";
        document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active-line'));
        updateState();
    }

    function evaluateInner(iVal) {
        try {
            // Evaluates the string expression using iVal
            return new Function('i', 'return ' + innerLogic)(iVal);
        } catch(e) { return 0; }
    }

    function updateState() { 
        document.getElementById('i-display').innerText = "i: " + (step === 0 && i >= outerLimit ? "--" : i);
        document.getElementById('j-display').innerText = "j: " + (step === 2 ? j : "--"); 
    }

    function nextStep() {
        const lines = [document.getElementById('line-0'), document.getElementById('line-1'), document.getElementById('line-2'), document.getElementById('line-3')];
        lines.forEach(l => l.classList.remove('active-line'));

        if (i >= outerLimit) { outputBox.innerHTML += "<br>Loop finished."; return; }

        if (step === 0) {
            lines[0].classList.add('active-line');
            j = 0; step = 1;
        } else if (step === 1) {
            lines[1].classList.add('active-line');
            step = (j < evaluateInner(i)) ? 2 : 3;
        } else if (step === 2) {
            lines[2].classList.add('active-line');
            outputBox.innerHTML += symbol;
            j++; step = 1;
        } else {
            lines[3].classList.add('active-line');
            outputBox.innerHTML += "<br>";
            i++; step = 0;
        }
        updateState();
    }
</script>
</body>
</html>
